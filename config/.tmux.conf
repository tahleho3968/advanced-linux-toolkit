# ============================================================
# Advanced Linux Toolkit - tmux Configuration
# Enhanced terminal multiplexer settings
# ============================================================

# ------------------------------
# General Settings
# ------------------------------
set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g mouse on
set -g set-clipboard on
set -g allow-rename off
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ------------------------------
# Key Bindings
# ------------------------------
# Change prefix to Ctrl-a (like screen)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Configuration reloaded!"

# Split panes
bind | split-window -h
bind - split-window -v

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Synchronize panes
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Kill pane
bind x kill-pane

# Window management
bind c new-window
bind , rename-window
bind & kill-window

# Copy mode (vi style)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Quick session management
bind S list-sessions
bind s new-session

# ------------------------------
# Status Bar
# ------------------------------
set -g status-position top
set -g status-justify left
set -g status-bg black
set -g status-fg white
set -g status-left-length 40
set -g status-right-length 80

# Status bar content
set -g status-left "#[fg=green] #S #[fg=white]|"

set -g status-right "#[fg=yellow] %Y-%m-%d #[fg=white]| #[fg=cyan] %H:%M "

# Window status
set -g window-status-format " #I #W "
set -g window-status-current-format "#[fg=green]#[bg=black] #I #W #[default]"
set -g window-status-separator ""

# Active window highlight
set -g window-status-current-bg black
set -g window-status-current-fg green

# ------------------------------
# Colors and Styling
# ------------------------------
# Pane border colors
set -g pane-border-style fg=white,bg=black
set -g pane-active-border-style fg=green,bg=black

# Message style
set -g message-style fg=black,bg=green

# Command style
set -g command-style fg=white,bg=black

# ------------------------------
# Plugins (if tpm is installed)
# ------------------------------
# List of plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'

# ------------------------------
# Custom Key Bindings for Toolkit
# ------------------------------
# Launch system monitor in new window
bind M command-prompt -p "Launch system monitor" "new-window -n monitor '~/.local/bin/system_monitor.sh'"

# Launch log analyzer
bind L command-prompt -p "Log file to analyze:" "new-window -n log '~/.local/bin/log_analyzer.sh %%'"

# Launch network scanner
bind N command-prompt -p "Target to scan:" "new-window -n scan '~/.local/bin/network_scanner.sh %%'"

# Launch disk usage analyzer
bind D command-prompt -p "Directory to analyze:" "new-window -n disk '~/.local/bin/disk_usage_analyzer.py %%'"

# ------------------------------
# Automatic Session Setup
# ------------------------------
# Create a default session with common windows
if-shell -b '[ -z "$TMUX" ]' {
    new-session -d -s main
    new-window -t main -n shell
    new-window -t main -n monitor '~/.local/bin/system_monitor.sh'
    new-window -t main -n editor 'vim'
    select-window -t main:1
    attach-session -t main
}
